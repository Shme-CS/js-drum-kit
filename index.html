<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Drum Kit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>JavaScript Drum Kit</h1>
    
    <div class="drum-container">
        <div class="drum-pad" data-key="a">
            <span class="key">A</span>
            <span class="sound">Kick</span>
        </div>
        <div class="drum-pad" data-key="s">
            <span class="key">S</span>
            <span class="sound">Snare</span>
        </div>
        <div class="drum-pad" data-key="d">
            <span class="key">D</span>
            <span class="sound">Hi-hat</span>
        </div>
        <div class="drum-pad" data-key="f">
            <span class="key">F</span>
            <span class="sound">Tom</span>
        </div>
        <div class="drum-pad" data-key="g">
            <span class="key">G</span>
            <span class="sound">Clap</span>
        </div>
        <div class="drum-pad" data-key="h">
            <span class="key">H</span>
            <span class="sound">Ride</span>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
